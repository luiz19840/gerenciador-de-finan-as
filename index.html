<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Orçamento</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
            padding: 20px;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 400px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #218838;
        }
        .resultado {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Regra 50/30/20</h2>
    <label for="valor">Digite sua renda total (R$):</label>
    <input type="number" id="valor" placeholder="Ex: 3000">
    
    <button onclick="calcular()">Calcular</button>

    <div id="resultado" class="resultado"></div>
</div>

<script>
    function calcular() {
        // 1. Pega o valor digitado no input
        const renda Total = Number(document.getElementById('valor').value);

        // Validação simples caso o usuário não digite nada
        if (!rendaTotal || rendaTotal <= 0) {
            document.getElementById('resultado').innerHTML = "<p style='color: red;'>Por favor, insira um valor válido.</p>";
            return;
        }

        // 2. Calcula as divisões (Exemplo: 50% Necessidades, 30% Desejos, 20% Poupança)
        const necessidades = rendaTotal * 0.50;
        const desejos = rendaTotal * 0.30;
        const poupanca = rendaTotal * 0.20;

        // 3. Exibe o resultado dentro da div 'resultado'
        document.getElementById('resultado').innerHTML = `
            <p>🟢 Necessidades (50%): R$ ${necessidades.toFixed(2)}</p>
            <p>🟡 Desejos (30%): R$ ${desejos.toFixed(2)}</p>
            <p>🔵 Poupança/Investimentos (20%): R$ ${poupanca.toFixed(2)}</p>
        `;
    }
</script>

</body>
</html>
